name: Build and test

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '35 4 * * TUE' # Tuesday at 04:35 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-matrix:
    name: Ubuntu py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniconda-version: "latest"
          python-version: ${{ matrix.python-version }}
          activate-environment: sbm_build_env
          channel-priority: strict
          environment-file: ci/requirements-linux.yml

      - name: Build and install
        run: |
          python -m pip install --no-build-isolation --no-deps .
      - name: Run tests
        run: |
          pytest -v --pyargs climlab_sbm_convection

  build-and-test:
    name: Build and test
    needs: build-and-test-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify matrix jobs succeeded
        run: |
          if [[ "${{ needs.build-and-test-matrix.result }}" != "success" ]]; then
            echo "Matrix jobs did not all succeed: ${{ needs.build-and-test-matrix.result }}"
            exit 1
          fi
